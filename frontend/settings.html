<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreshStart SOC | Settings</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <span class="brand">FreshStart SOC</span>
        <div class="nav-links">
          <a href="/index.html">Dashboard</a>
          <a href="/alerts.html">Alerts</a>
          <a href="/investigations.html">Investigations</a>
          <a href="/assets.html">Assets</a>
          <a href="/active-response.html">Active Response</a>
          <a href="/settings.html" class="active">Settings</a>
        </div>
      </div>
      <div class="nav-right">
        <div class="status-chip">
          <span class="status-dot live"></span>
          System Status: Live
        </div>
        <div class="status-chip">
          <span class="status-dot warn"></span>
          Wazuh: Connected
        </div>
        <div class="status-chip">Response Mode: Detect Only</div>
        <span class="pill live-badge">Live</span>
      </div>
    </nav>

    <div class="page-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">System Configuration</p>
          <h1>Settings</h1>
          <p class="hero-copy">Manage core SOC platform configuration values.</p>
        </div>
      </header>

      <section class="panel">
        <div class="panel-head">
          <h2>Configuration</h2>
          <span class="muted">Changes are saved to config.yaml</span>
        </div>
        <div id="settings-error" class="error-banner hidden"></div>
        <div class="filters">
          <label class="filter-field">
            <span>Wazuh Manager IP</span>
            <input id="setting-wazuh-ip" type="text" placeholder="192.168.33.101" />
          </label>
          <label class="filter-field">
            <span>Syslog Port</span>
            <input id="setting-syslog-port" type="number" placeholder="1514" />
          </label>
          <label class="filter-field">
            <span>Database Type</span>
            <input id="setting-database" type="text" placeholder="memory" />
          </label>
          <label class="filter-field">
            <span>Response Mode</span>
            <input id="setting-response-mode" type="text" placeholder="Detect Only" />
          </label>
        </div>
        <div class="settings-actions">
          <button id="save-settings" class="ghost">Save Settings</button>
          <span id="settings-message" class="muted"></span>
        </div>
      </section>
    </div>

    <script src="/settings.js"></script>
  </body>
</html>
